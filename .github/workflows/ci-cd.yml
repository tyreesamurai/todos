name: CI / CD
on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install Dependencies
        run: bun install --frozen-lockfile
      - name: CI
        run: bun run ci

  build:
    needs: quality
    if: github.ref == 'refs/heads/main'
    uses: tyreesamurai/ci-cd/.github/workflows/build-and-push.yml@main

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    uses: tyreesamurai/ci-cd/.github/workflows/deploy.yml@main
    with:
      service_path: /srv/services/todos
    secrets: inherit
